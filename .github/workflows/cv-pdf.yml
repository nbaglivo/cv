name: CV to PDF

on:
  push:
    branches: [main]
    paths: ['src/cv.md', '.github/workflows/cv-pdf.yml', 'package.json', 'tsconfig.json', 'scripts/**']
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Convert CV to PDF
        uses: baileyjm02/markdown-to-pdf@v1
        with:
          input_path: src/cv.md
          output_dir: pdf
          build_html: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Upload to Vercel Blob
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: npx tsx scripts/upload-cv.ts
